services:
  search:
    build: .
    ports:
      - "8108:8108"
    volumes:
      - vectoria-data:/data
    environment:
      HOST: "0.0.0.0"
      PORT: "8108"
      VECTORIA_INDEX: "products"
      STATIC_DIR: "/app/static"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8108/1/indexes/products/query -X POST -H 'Content-Type: application/json' -d '{\"query\":\"\",\"hitsPerPage\":1}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  loader:
    build: .
    depends_on:
      search:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/scripts/load_products.sh", "http://search:8108", "products"]

  wands:
    image: python:3.11-slim
    depends_on:
      search:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - wands-cache:/tmp/wands_cache
    environment:
      SERVER_URL: "http://search:8108"
    command: ["python3", "/scripts/wands_setup.py", "--server", "http://search:8108", "--cache-dir", "/tmp/wands_cache", "--eval"]
    profiles:
      - wands

  esci:
    build:
      context: scripts
      dockerfile: Dockerfile.esci
    depends_on:
      search:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - esci-cache:/scripts/.esci_cache
    environment:
      SERVER_URL: "http://search:8108"
    command: ["python3", "/scripts/esci_setup.py", "--server", "http://search:8108", "--eval", "--cache-dir", "/scripts/.esci_cache"]
    profiles:
      - esci

  test:
    build:
      context: tests/client
      dockerfile: Dockerfile
    depends_on:
      search:
        condition: service_healthy
    environment:
      SERVER_URL: "http://search:8108"
    profiles:
      - test

volumes:
  vectoria-data:
  wands-cache:
  esci-cache:
